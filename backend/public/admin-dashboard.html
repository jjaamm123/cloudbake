<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudBake Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        .grid { display: flex; gap: 20px; }
        .column { flex: 1; }
        .card { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
        
        input, textarea, button { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Button Styling */
        button { background-color: #ff8c42; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button:hover { background-color: #e07a38; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-group button { margin-bottom: 0; }
        
        .delete-btn { background-color: #e74c3c; }
        .delete-btn:hover { background-color: #c0392b; }
        
        .edit-btn { background-color: #3498db; }
        .edit-btn:hover { background-color: #2980b9; }
        
        .cancel-btn { background-color: #95a5a6; display: none; }
        .cancel-btn:hover { background-color: #7f8c8d; }

        .view-btn { background-color: #2ecc71; margin-top: 10px;}
        .view-btn:hover { background-color: #27ae60; }

        /* Message Details container */
        .msg-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc; background-color: #fcfcfc; padding: 10px; border-radius: 4px;}
    </style>
</head>
<body>

<div class="container">
    <h1> CloudBake Admin</h1>
    
    <div class="grid">
        <!-- Add / Edit Menu Item Form -->
        <div class="column">
            <h2 id="formTitle">Add Menu Item</h2>
            <div class="card">
                <form id="menuForm">
                    <!-- Hidden input to store ID when editing -->
                    <input type="hidden" id="editItemId">
                    
                    <label>Item Name</label>
                    <input type="text" id="itemName" required placeholder="e.g., Chocolate Croissant">
                    
                    <label>Price ($)</label>
                    <input type="number" id="itemPrice" required placeholder="e.g., 4.50" step="0.01">
                    
                    <label>Description</label>
                    <textarea id="itemDesc" required placeholder="Describe the pastry..."></textarea>
                    
                    <div class="btn-group">
                        <button type="submit" id="submitBtn">Save to Database</button>
                        <button type="button" id="cancelBtn" class="cancel-btn" onclick="resetForm()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- View Existing Menu Items -->
        <div class="column">
            <h2>Current Menu</h2>
            <div id="menuList">
                <p>Loading menu...</p>
            </div>
        </div>
    </div>

    <hr>

    <!-- View Contact Queries -->
    <h2>Customer Messages</h2>
    <div id="messageList" class="grid" style="flex-wrap: wrap;">
         <p>Loading messages...</p>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:5000/api/admin';
    const PUBLIC_API_URL = 'http://localhost:5000/api/products'; // Assuming this is your public route

    // --- 1. FETCH AND DISPLAY MENU ---
    async function loadMenu() {
        try {
            const response = await fetch(PUBLIC_API_URL); 
            const items = await response.json();
            
            const menuDiv = document.getElementById('menuList');
            menuDiv.innerHTML = '';

            items.forEach(item => {
                // We pass the item data into the edit function
                menuDiv.innerHTML += `
                    <div class="card">
                        <h3 style="margin-top:0;">${item.name} - $${item.price}</h3>
                        <p style="color: #666;">${item.description}</p>
                        <div class="btn-group">
                            <button class="edit-btn" onclick="startEdit('${item._id}', '${item.name.replace(/'/g, "\\'")}', '${item.price}', '${item.description.replace(/'/g, "\\'")}')">Edit</button>
                            <button class="delete-btn" onclick="deleteMenuItem('${item._id}')">Delete</button>
                        </div>
                    </div>
                `;
            });
        } catch (error) {
            console.error('Error loading menu:', error);
            document.getElementById('menuList').innerHTML = '<p style="color:red;">Failed to load menu. Is the server running?</p>';
        }
    }

    // --- 2. HANDLE FORM SUBMIT (ADD OR UPDATE) ---
    document.getElementById('menuForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const editId = document.getElementById('editItemId').value;
        const itemData = {
            name: document.getElementById('itemName').value,
            price: document.getElementById('itemPrice').value,
            description: document.getElementById('itemDesc').value
        };

        try {
            let response;
            if (editId) {
                // If there's an ID, we are UPDATING (PUT)
                response = await fetch(`${API_URL}/menu/${editId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(itemData)
                });
            } else {
                // If no ID, we are ADDING (POST)
                response = await fetch(`${API_URL}/menu`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(itemData)
                });
            }

            if(response.ok) {
                resetForm();
                loadMenu(); // Refresh the visual list
            }
        } catch (error) {
            console.error('Error saving item:', error);
        }
    });

    // --- 3. PREPARE FORM FOR EDITING ---
    function startEdit(id, name, price, desc) {
        document.getElementById('formTitle').innerText = "Edit Menu Item";
        document.getElementById('submitBtn').innerText = "Update Item";
        document.getElementById('cancelBtn').style.display = "block"; // Show cancel button
        
        // Fill the inputs
        document.getElementById('editItemId').value = id;
        document.getElementById('itemName').value = name;
        document.getElementById('itemPrice').value = price;
        document.getElementById('itemDesc').value = desc;
        
        // Scroll to top so user sees the form
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- 4. RESET FORM ---
    function resetForm() {
        document.getElementById('menuForm').reset();
        document.getElementById('editItemId').value = '';
        document.getElementById('formTitle').innerText = "Add Menu Item";
        document.getElementById('submitBtn').innerText = "Save to Database";
        document.getElementById('cancelBtn').style.display = "none";
    }

    // --- 5. DELETE MENU ITEM ---
    async function deleteMenuItem(id) {
        if(confirm('Are you sure you want to delete this pastry?')) {
            try {
                await fetch(`${API_URL}/menu/${id}`, { method: 'DELETE' });
                loadMenu(); 
            } catch (error) {
                console.error('Error deleting item:', error);
            }
        }
    }

    // --- 6. FETCH AND DISPLAY MESSAGES ---
    async function loadMessages() {
        try {
            const response = await fetch(`${API_URL}/messages`);
            const data = await response.json();
            
            const messageDiv = document.getElementById('messageList');
            messageDiv.innerHTML = '';

            if (!data.data || data.data.length === 0) {
                messageDiv.innerHTML = '<p>No new messages.</p>';
                return;
            }

            data.data.forEach(msg => {
                const date = new Date(msg.createdAt).toLocaleDateString();
                // We create a card with a hidden details section
                messageDiv.innerHTML += `
                    <div class="card" style="flex: 1 1 calc(50% - 20px); min-width: 300px;">
                        <h3 style="margin-top:0;">From: ${msg.name}</h3>
                        <p style="color: #666; margin-bottom:5px;">Received: ${date}</p>
                        
                        <button class="view-btn" onclick="toggleMessage('${msg._id}')">Read Full Message</button>
                        
                        <div id="msg-${msg._id}" class="msg-details">
                            <strong>Contact Email:</strong> <a href="mailto:${msg.email}">${msg.email}</a><br><br>
                            <strong>Message:</strong><br>
                            <p style="line-height: 1.5;">${msg.message}</p>
                        </div>
                    </div>
                `;
            });
        } catch (error) {
            console.error('Error loading messages:', error);
            document.getElementById('messageList').innerHTML = '<p style="color:red;">Failed to load messages.</p>';
        }
    }

    // --- 7. TOGGLE MESSAGE VISIBILITY ---
    function toggleMessage(id) {
        const detailsDiv = document.getElementById(`msg-${id}`);
        if (detailsDiv.style.display === "block") {
            detailsDiv.style.display = "none";
        } else {
            detailsDiv.style.display = "block";
        }
    }

    // Boot up
    window.onload = () => {
        loadMenu();
        loadMessages();
    };
</script>

</body>
</html>
