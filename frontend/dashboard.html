<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudBake | My Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="icon" href="images/favicon.png" type="image/png">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-cloud"></i>
                <span>CloudBake</span>
            </a>
            <a href="index.html" class="back-home-btn">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </nav>

    <div class="dashboard-container">

        <div class="profile-card">
            <div class="profile-avatar"><i class="fas fa-user"></i></div>

            <h2 id="user-name">Loading...</h2>
            <p id="user-email" class="user-email-text">...</p>

            <div class="loyalty-section">
                <h3 class="loyalty-title">Loyalty Tier</h3>

                <div id="loyalty-badge" class="loyalty-badge tier-bronze">
                    <i class="fas fa-medal"></i> Bronze Member
                </div>
                <div class="loyalty-progress-wrap" id="loyalty-progress-wrap">
                    <div class="loyalty-progress-labels">
                        <span id="tier-current-label">Bronze</span>
                        <span id="tier-next-label">Silver</span>
                    </div>
                    <div class="loyalty-bar">
                        <div class="loyalty-bar-fill" id="loyalty-bar-fill" style="width: 0%"></div>
                    </div>
                </div>

                <p id="loyalty-text" class="loyalty-hint">Calculating your rewards…</p>

                <!-- Perks -->
                <div class="loyalty-perks" id="loyalty-perks"></div>
            </div>

            <a href="account.html" class="account-btn">
                <i class="fas fa-user-cog"></i> Manage Account
            </a>

            <button class="logout-btn" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <div class="orders-card">
            <div class="orders-card-header">
                <h2><i class="fas fa-history"></i> My Order History</h2>
                <span id="orders-count-badge" class="orders-count-badge" style="display:none;"></span>
            </div>

            <div style="overflow-x: auto;">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Total Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list">
                        <tr>
                            <td colspan="4" class="table-status-cell">
                                <i class="fas fa-spinner fa-spin"></i> Loading your delicious history…
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
